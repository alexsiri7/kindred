name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run gates
        run: ./scripts/gates.sh

  docker-build:
    name: docker build (repo-root context)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp/Dockerfile
          tags: kindred-mcp:ci
          load: true
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          tags: kindred-web:ci
          load: true
          build-args: |
            VITE_SUPABASE_URL=https://example.invalid
            VITE_SUPABASE_ANON_KEY=ci-placeholder
            VITE_API_BASE_URL=https://example.invalid
            VITE_SENTRY_DSN=
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
